name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Steps, commands, and a minimal project structure if possible.
      placeholder: |
        1. Run `repo-readme-polisher ...`
        2. See output ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, shell
